<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Three Worlds | Hub</title>
    <!-- Google Fonts: Fraunces for the bold serif, Inter for the clean italic -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,900&family=Inter:ital,wght@1,300&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="background-shapes">
        <div class="shape pink-shape"></div>
        <div class="shape orange-shape"></div>
        <div class="shape teal-shape"></div>
        <div class="shape yellow-shape"></div>
        <div class="shape green-shape"></div>
    </div>

    <main class="content-wrapper">
        <header class="hero-section">
            <h1 class="title">Monday</h1>
            <p class="subtitle">Inspiration &mdash; The Three Worlds Switcher</p>
        </header>

        <section class="actions">
            <!-- Link to the calendar. User can replace this href when merged -->
            <a href="http://localhost:5173/" class="primary-button">
                <span class="button-text">Open Rainbow Calendar</span>
                <span class="button-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                        <polyline points="12 5 19 12 12 19"></polyline>
                    </svg>
                </span>
            </a>
        </section>

        <!-- App mode preview cards -->
        <section class="modes-preview">
            <div class="mode-card orbit">
                <div class="mode-dot"></div>
                <h3>Orbit</h3>
                <p>High-level view of your universe</p>
            </div>
            <div class="mode-card rainbow">
                <div class="mode-dot"></div>
                <h3>Rainbow</h3>
                <p>Time as presence, daily calendar</p>
            </div>
            <div class="mode-card balloon">
                <div class="mode-dot"></div>
                <h3>Balloon</h3>
                <p>Interactive tasks floating in space</p>
            </div>
        </section>
    </main>
</body>

</html>
